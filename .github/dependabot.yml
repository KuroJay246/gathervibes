version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Barbados
    open-pull-requests-limit: 5
    groups:
      react-app-runtime:
        patterns:
          - react
          - react-dom
          - react-router-dom
          - "@sentry/*"
      firebase-runtime:
        patterns:
          - firebase
          - firebase-admin
          - "@firebase/*"
      build-and-test-tooling:
        dependency-type: development
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Barbados
